<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영관리자 콘솔 | REVARO</title>
<style>
  :root{--kakao:#FEE500;--ink:#191919;--soft:#3C3C3C;--muted:#767676;--line:#ECECEC;--line2:#F2F2F2;--bg:#FAFAF8;--yellow:#FFFBE6;--yellow-line:#FFF6C7;--green:#15803D;--amber:#B8860B;--red:#E0483C;--blue:#2563EB}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.55} button,input,select,textarea{font:inherit} button{cursor:pointer}
  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;background:#fff;border-right:1px solid var(--line);padding:22px 16px}.brand{font-size:1.25rem;font-weight:800;letter-spacing:-.025em}.brand span{color:#F2D200}.sub{font-size:.75rem;color:var(--muted);font-weight:700;margin-top:3px}.side-head{padding:6px 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .menu{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}.menu button{width:100%;border:0;background:transparent;text-align:left;border-radius:11px;padding:11px 12px;color:var(--soft);font-size:.875rem;font-weight:600}.menu button:hover{background:var(--bg);color:var(--ink)}.menu button.on{background:#FFFBE0;color:var(--ink)}.logout{margin-top:18px;color:#C0453B!important}
  .main{padding:28px 30px 70px;max-width:1200px;width:100%}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.top h1{font-size:1.25rem;font-weight:800;letter-spacing:-.025em;margin:0}.top p{margin:5px 0 0;color:var(--muted);font-size:.875rem}.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:#EEF6EE;padding:8px 13px;font-size:.75rem;font-weight:700;color:#3F8E45}
  .screen{display:none}.screen.active{display:block}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:22px}.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:0 1px 2px rgba(25,25,25,.04)}.kpi.accent{background:var(--yellow);border-color:var(--yellow-line)}.kpi .label{font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:7px}.kpi .value{font-size:1.5rem;font-weight:800;letter-spacing:-.025em;line-height:1}.kpi .unit{font-size:.875rem;color:var(--muted);font-weight:500;margin-left:3px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(25,25,25,.04);overflow:hidden;margin-bottom:18px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line2)}.panel-head h2{font-size:1.08rem;margin:0}.panel-head .hint{font-size:.82rem;color:var(--muted);margin-top:2px}.panel-body{padding:18px 20px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}
  .tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{border:0;border-radius:999px;padding:7px 13px;font-weight:700;font-size:.875rem;background:var(--line2);color:var(--soft)}.tab.on{background:var(--ink);color:#fff}.tools{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}.search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 12px}.search input{border:0;outline:0;background:transparent;width:220px}
  table{width:100%;border-collapse:collapse} th{background:var(--bg);color:var(--muted);font-size:.75rem;font-weight:700;text-align:left;padding:11px 14px} td{border-top:1px solid var(--line2);padding:13px 14px;font-size:.875rem;vertical-align:middle}.name{font-weight:700}.muted{color:var(--muted);font-size:.75rem}.badge{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:700}.green{background:#ECFDF3;color:var(--green)}.amber{background:#FFF6D6;color:var(--amber)}.gray{background:#F4F4F5;color:#71717A}.red{background:#FDECEC;color:var(--red)}.dark{background:#E4E4E7;color:#3F3F46}.blue{background:#EFF6FF;color:var(--blue)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:.75rem;font-weight:700;color:var(--ink)}.btn.primary{border-color:var(--kakao);background:var(--kakao)}.btn:hover{filter:brightness(.98)}
  .task{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 20px;border-top:1px solid var(--line2)}.task:first-child{border-top:0}.task-title{font-weight:700}.task-desc{color:var(--muted);font-size:.75rem;margin-top:2px}.empty{padding:44px 20px;text-align:center;color:var(--muted)}.empty b{display:block;color:var(--soft);margin-bottom:5px}
  .drawer{position:fixed;right:0;top:0;height:100vh;width:min(460px,100%);background:#fff;border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(25,25,25,.16);z-index:50;transform:translateX(110%);transition:.22s}.drawer.open{transform:none}.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:22px;border-bottom:1px solid var(--line)}.drawer-body{padding:20px 22px;overflow:auto;max-height:calc(100vh - 86px)}.close{border:1px solid var(--line);background:#fff;border-radius:10px;width:36px;height:36px}
  .formrow{margin-bottom:15px}.formrow label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px}.formrow input,.formrow select,.formrow textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;outline:0}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;border-radius:999px;padding:11px 16px;font-size:.875rem;font-weight:600;transition:.2s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%)}
  .settings{grid-template-columns:repeat(2,minmax(0,1fr))}.setting-box{border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px}.setting-box h3{font-size:.875rem;font-weight:800;margin:0 0 10px}.setting-box li{margin:7px 0;color:var(--soft)}
  @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.main{padding:20px}.kpis,.two,.settings{grid-template-columns:1fr}.search input{width:150px} table{min-width:760px}.table-wrap{overflow:auto}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-head"><div class="brand">Revaro<span>.me</span></div><div class="sub">운영관리자 콘솔</div></div>
    <ul class="menu" id="menu"></ul>
    <button class="logout btn" onclick="logout()">로그아웃</button>
  </aside>
  <main class="main">
    <div class="top"><div><h1 id="pageTitle">운영관리자 대시보드</h1><p>전체 점주, 고객, 발송, 결제 상태를 mock 데이터로 확인합니다.</p></div><span class="chip">내부 운영자 · <span id="operatorName">operator</span></span></div>
    <section class="screen active" id="dashboard"></section>
    <section class="screen" id="stores"></section>
    <section class="screen" id="customers"></section>
    <section class="screen" id="messages"></section>
    <section class="screen" id="billing"></section>
    <section class="screen" id="settings"></section>
  </main>
</div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>
<script>
if(localStorage.getItem('revaroOperatorSession') !== 'active') location.replace('/operator/login');
document.getElementById('operatorName').textContent = localStorage.getItem('revaroOperatorName') || '운영자';

const menus=[['dashboard','대시보드'],['stores','점주 관리'],['customers','고객 데이터'],['messages','AI 메시지·발송'],['billing','결제·프로모션'],['settings','기본 설정']];
const badges={pending:['승인대기','amber'],active:['활성','green'],inactive:['비활성','gray'],blocked:['차단','red'],churned:['해지','dark'],trial:['무료체험','amber'],trial_ending:['체험 종료 임박','amber'],paid:['정상','green'],overdue:['미납','red'],hold:['보류','gray'],new:['신규','blue'],returning:['재방문','green'],at_risk:['이탈위험','red'],dormant:['휴면','gray'],queued:['대기','amber'],sent:['발송완료','green'],failed:['실패','red']};
const stores=[
{id:'s1',storeName:'라온 헤어 신촌점',ownerName:'김라온',category:'헤어샵',region:'서울 서대문구',phone:'010-1234-5678',joinedAt:'2026.05.02',status:'active',customerCount:312,monthlySentCount:96,plan:'기본',billingStatus:'paid',otp:{code:'184920',issuedAt:'2026.06.18',used:false},memo:'재방문율 우수 매장.'},
{id:'s2',storeName:'뷰티네일 의정부',ownerName:'박지수',category:'네일샵',region:'경기 의정부시',phone:'010-2222-3333',joinedAt:'2026.06.10',status:'pending',customerCount:0,monthlySentCount:0,plan:'기본',billingStatus:'trial',otp:{code:'552019',issuedAt:'2026.06.18',used:false},memo:'가입 신청 검토 중.'},
{id:'s3',storeName:'포레스트 피부관리',ownerName:'이서연',category:'피부관리실',region:'서울 강남구',phone:'010-7777-8888',joinedAt:'2026.04.18',status:'active',customerCount:188,monthlySentCount:54,plan:'기본',billingStatus:'paid',otp:{code:'903114',issuedAt:'2026.06.01',used:true},memo:''},
{id:'s4',storeName:'멍멍살롱 일산',ownerName:'최도현',category:'애견미용',region:'경기 고양시',phone:'010-4545-1212',joinedAt:'2026.03.21',status:'active',customerCount:97,monthlySentCount:23,plan:'기본',billingStatus:'overdue',otp:{code:'771201',issuedAt:'2026.06.17',used:false},memo:'이번 달 이용료 미납. 확인 필요.'},
{id:'s5',storeName:'글로우 헤어 부평',ownerName:'정하늘',category:'헤어샵',region:'인천 부평구',phone:'010-9090-3434',joinedAt:'2026.02.09',status:'inactive',customerCount:142,monthlySentCount:0,plan:'기본',billingStatus:'hold',otp:{code:'229034',issuedAt:'2026.05.29',used:true},memo:'2주째 로그인 없음.'},
{id:'s6',storeName:'코지 네일 판교',ownerName:'한가람',category:'네일샵',region:'경기 성남시',phone:'010-1212-5656',joinedAt:'2026.06.14',status:'pending',customerCount:0,monthlySentCount:0,plan:'기본',billingStatus:'trial',otp:{code:'440918',issuedAt:'2026.06.18',used:false},memo:''},
{id:'s7',storeName:'댕댕뷰티 수원',ownerName:'오서진',category:'애견미용',region:'경기 수원시',phone:'010-5656-9090',joinedAt:'2026.04.21',status:'active',customerCount:121,monthlySentCount:41,plan:'기본',billingStatus:'trial',otp:{code:'862104',issuedAt:'2026.06.02',used:true},memo:'3개월 차 결제 안내 예정.'},
{id:'s8',storeName:'온리뷰티 마포',ownerName:'문하린',category:'피부관리실',region:'서울 마포구',phone:'010-3434-7878',joinedAt:'2026.04.24',status:'active',customerCount:86,monthlySentCount:29,plan:'기본',billingStatus:'trial',otp:{code:'618420',issuedAt:'2026.06.05',used:true},memo:'체험 종료 전 안내 필요.'}
];
const customers=[['김서연','010-****-5678','라온 헤어 신촌점',7,'2026.05.11','at_risk',true],['이준호','010-****-2233','라온 헤어 신촌점',3,'2026.05.25','returning',true],['박지민','010-****-9001','포레스트 피부관리',1,'2026.06.12','new',false],['최은우','010-****-4412','댕댕뷰티 수원',5,'2026.05.30','returning',true],['정하늘','010-****-7788','라온 헤어 신촌점',9,'2026.04.07','dormant',true],['윤서진','010-****-3030','글로우 헤어 부평',4,'2026.05.21','returning',false]];
const messages=[['라온 헤어 신촌점','김서연','재방문 안내','서연님, 지난번 컬러 잘 유지되고 계신가요?',true,'sent','2026.06.18 10:00','성공'],['포레스트 피부관리','박지민','환영','첫 방문 감사합니다. 다음 관리 시점에 맞춰 안내드릴게요.',false,'queued','2026.06.19 11:00','—'],['멍멍살롱 일산','최은우','혜택 안내','다음 방문 때 쓰실 수 있는 단골 혜택 안내드려요.',true,'failed','2026.06.17 09:30','수신 거부 번호'],['글로우 헤어 부평','윤서진','혜택 안내','곧 뿌리 염색 시기예요. 예약을 도와드릴게요.',false,'failed','2026.06.17 14:00','발송 한도 초과']];
const metrics={totalStores:142,activeStores:118,newStoresThisMonth:14,churnedStoresThisMonth:6,totalCustomers:8940,sentThisMonth:3210,sendSuccessRate:98.2,expectedRevenue:4106400,expectedAlimtalkCost:240750};
const won=n=>n.toLocaleString('ko-KR')+'원';
function badge(v){let b=badges[v]||[v,'gray'];return `<span class="badge ${b[1]}">${b[0]}</span>`}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2300)}
function parseDate(v){let [y,m,d]=String(v).split(/[.-]/).map(Number);return new Date(y,m-1,d)}
function formatDate(d){return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')}
function addMonths(v,n){let d=parseDate(v);let day=d.getDate();d.setMonth(d.getMonth()+n);if(d.getDate()<day)d.setDate(0);return d}
function trialEndsAt(s){return formatDate(addMonths(s.joinedAt,2))}
function daysUntil(v){let end=typeof v==='string'?parseDate(v):v;let now=new Date();let today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.round((end-today)/86400000)}
function ddayText(d){return d===0?'오늘 종료':'D-'+d}
function billingStatusOf(s){let d=daysUntil(trialEndsAt(s));return s.billingStatus==='trial'&&d>=0&&d<=7?'trial_ending':s.billingStatus}
function logout(){localStorage.removeItem('revaroOperatorSession');location.href='/operator/login'}
function switchScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.menu button').forEach(b=>b.classList.toggle('on',b.dataset.id===id));document.getElementById('pageTitle').textContent=menus.find(m=>m[0]===id)[1];history.replaceState(null,'','/operator'+(id==='dashboard'?'':'#'+id))}
function renderMenu(){document.getElementById('menu').innerHTML=menus.map(m=>`<li><button data-id="${m[0]}" class="${m[0]==='dashboard'?'on':''}" onclick="switchScreen('${m[0]}')">${m[1]}</button></li>`).join('')}
function kpi(label,value,unit='',accent=''){return `<div class="kpi ${accent}"><div class="label">${label}</div><div class="value">${value}${unit?`<span class="unit">${unit}</span>`:''}</div></div>`}
function panel(title,sub,body,right=''){return `<div class="panel"><div class="panel-head"><div><h2>${title}</h2>${sub?`<div class="hint">${sub}</div>`:''}</div>${right}</div>${body}</div>`}
function renderDashboard(){let pending=stores.filter(s=>s.status==='pending'), failed=messages.filter(m=>m[5]==='failed'), need=messages.filter(m=>!m[4]&&m[5]==='queued'), overdue=stores.filter(s=>['overdue','hold'].includes(s.billingStatus)), trialEnding=stores.map(s=>({...s,trialEndsAt:trialEndsAt(s),trialDays:daysUntil(trialEndsAt(s))})).filter(s=>s.billingStatus==='trial'&&s.trialDays>=0&&s.trialDays<=7).sort((a,b)=>a.trialDays-b.trialDays);document.getElementById('dashboard').innerHTML=`<div class="grid kpis">${kpi('전체 점주',metrics.totalStores,'곳')}${kpi('활성 점주',metrics.activeStores,'곳')}${kpi('이번 달 신규',metrics.newStoresThisMonth,'곳')}${kpi('해지·비활성',metrics.churnedStoresThisMonth,'곳')}${kpi('전체 고객',metrics.totalCustomers.toLocaleString(),'명')}${kpi('이번 달 발송',metrics.sentThisMonth.toLocaleString(),'건')}${kpi('발송 성공률',metrics.sendSuccessRate+'%')}${kpi('예상 매출',won(metrics.expectedRevenue),'','accent')}${kpi('알림톡 예상 비용',won(metrics.expectedAlimtalkCost))}</div><div class="grid two">${taskPanel('승인 대기 점주',pending,s=>`${s.storeName}<br><span class="muted">${s.ownerName} · ${s.category}</span>`)}${taskPanel('발송 실패',failed,m=>`${m[0]} · ${m[1]}<br><span class="muted">${m[7]}</span>`)}${taskPanel('미납·결제 확인',overdue,s=>`${s.storeName}<br><span class="muted">${badges[s.billingStatus][0]} · ${s.memo||'확인 필요'}</span>`)}${taskPanel('체험 종료 임박 (7일 이내)',trialEnding,s=>`${s.storeName}<br><span class="muted">${s.ownerName} · 종료일 ${s.trialEndsAt} · 3개월 차 결제 안내 대상</span>`,s=>`<span class="badge amber">${ddayText(s.trialDays)}</span>`)}${taskPanel('AI 메시지 확인 필요',need,m=>`${m[0]} · ${m[1]}<br><span class="muted">${m[3]}</span>`)}</div>`}
function taskPanel(title,items,render,action){return panel(title,'',items.length?items.map(x=>`<div class="task"><div><div class="task-title">${render(x)}</div></div>${action?action(x):`<button class="btn primary" onclick="toast('처리 화면으로 이동합니다.')">확인</button>`}</div>`).join(''):`<div class="empty"><b>${title} 없음</b>지금 처리할 항목이 없습니다.</div>`,`<span class="badge amber">${items.length}건</span>`)}
function renderStores(filter='all'){let list=filter==='all'?stores:stores.filter(s=>s.status===filter);document.getElementById('stores').innerHTML=`<div class="tools"><div class="tabs">${[['all','전체'],['pending','승인대기'],['active','활성'],['inactive','비활성'],['blocked','차단'],['churned','해지']].map(t=>`<button class="tab ${filter===t[0]?'on':''}" onclick="renderStores('${t[0]}')">${t[1]}</button>`).join('')}</div><label class="search">검색 <input placeholder="매장명, 점주명"></label></div>${panel('점주 목록','목록 클릭 시 우측 상세 패널이 열립니다.',table(['매장','점주','업종','지역','상태','결제','액션'],list.map(s=>[`<span class="name">${s.storeName}</span><div class="muted">${s.phone}</div>`,s.ownerName,s.category,s.region,badge(s.status),badge(billingStatusOf(s)),`<button class="btn" onclick="openStore('${s.id}')">상세</button>`])))}`}
function renderCustomers(filter='all'){let list=filter==='all'?customers:customers.filter(c=>c[5]===filter);document.getElementById('customers').innerHTML=`<div class="tools"><div class="tabs">${[['all','전체'],['new','신규'],['returning','재방문'],['at_risk','이탈위험'],['dormant','휴면']].map(t=>`<button class="tab ${filter===t[0]?'on':''}" onclick="renderCustomers('${t[0]}')">${t[1]}</button>`).join('')}</div><label class="search">검색 <input placeholder="고객명, 매장명"></label></div>${panel('고객 데이터','고객 정보 직접 수정은 다음 단계입니다.',table(['고객','휴대폰','매장','방문','마지막 방문','상태','수정 이력'],list.map(c=>[c[0],c[1],c[2],c[3]+'회',c[4],badge(c[5]),`<button class="btn" onclick="toast('수정 이력은 곧 제공됩니다.')">보기</button>`])))}`}
function renderMessages(filter='all'){let list=filter==='all'?messages:messages.filter(m=>m[5]===filter||(!m[4]&&filter==='review'));document.getElementById('messages').innerHTML=`<div class="tools"><div class="tabs">${[['all','전체'],['queued','발송 대기'],['review','점주 확인 필요'],['failed','발송 실패'],['blocked','차단됨']].map(t=>`<button class="tab ${filter===t[0]?'on':''}" onclick="renderMessages('${t[0]}')">${t[1]}</button>`).join('')}</div></div>${panel('AI 메시지·발송','실제 발송은 이번 범위에서 제외됩니다.',table(['매장','고객','유형','미리보기','승인','발송','예약시각','상세'],list.map(m=>[m[0],m[1],m[2],m[3],m[4]?'승인':'대기',badge(m[5]),m[6],`<button class="btn" onclick="toast('상세 보기 mock입니다.')">상세</button>`])))}`}
function renderBilling(){document.getElementById('billing').innerHTML=panel('결제·프로모션','기본 요금제 34,800원, 2개월 무료 후 3개월 차부터 월 34,800원 기준입니다.',table(['매장','요금제','체험','결제 시작','상태','월 발송','프로모션','액션'],stores.map(s=>[s.storeName,'기본 · 34,800원',s.billingStatus==='trial'?'체험중':'없음',trialEndsAt(s),badge(billingStatusOf(s)),s.monthlySentCount+'건','2개월 무료',`<button class="btn" onclick="toast('결제 상태 변경 mock입니다.')">상태 변경</button>`])))}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="grid settings">${setting('업종별 재방문 주기',['헤어샵 30일','네일샵 21일','피부관리실 28일','애견미용 35일'])}${setting('업종별 메시지 톤',['헤어샵: 친근하고 전문적','네일샵: 밝고 감각적','피부관리: 차분하고 신뢰감','애견미용: 따뜻하고 편안함'])}${setting('기본 발송 시점',['오전 10시','점주 승인 후 발송','월 발송 한도 1,000건'])}${setting('예약 링크 정책',['선택 입력','메시지에 포함 가능','운영관리자 권한은 자리만 표시'])}</div>`}
function setting(title,items){return `<div class="setting-box"><h3>${title}</h3><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`}
function table(head,rows){return `<div class="table-wrap"><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${head.length}"><div class="empty"><b>검색 결과 없음</b>필터 조건을 바꿔보세요.</div></td></tr>`}</tbody></table></div>`}
function openStore(id){let s=stores.find(x=>x.id===id);document.getElementById('drawer').innerHTML=`<div class="drawer-head"><div><h2>${s.storeName}</h2><div class="muted">${s.ownerName} · ${s.category} · ${s.region}</div></div><button class="close" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="formrow"><label>매장 기본정보</label><input value="${s.phone}"></div><div class="formrow"><label>상태 변경</label><select><option>${badges[s.status][0]}</option><option>활성</option><option>비활성</option><option>차단</option><option>해지</option></select></div><div class="formrow"><label>최초 로그인 PIN</label><input value="${s.otp.code} · ${s.otp.used?'사용됨':'미사용'}"></div><button class="btn primary" onclick="toast('PIN을 재발급했습니다.')">PIN 재발급</button><div class="formrow" style="margin-top:16px"><label>결제 상태</label><input value="${badges[billingStatusOf(s)][0]}"></div><div class="formrow"><label>체험 종료일</label><input value="${trialEndsAt(s)}"></div><div class="formrow"><label>운영 메모</label><textarea rows="5">${s.memo}</textarea></div><button class="btn primary" onclick="toast('운영 메모를 저장했습니다.')">저장</button></div>`;document.getElementById('drawer').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open')}
renderMenu();renderDashboard();renderStores();renderCustomers();renderMessages();renderBilling();renderSettings();if(location.hash){let id=location.hash.slice(1);if(menus.some(m=>m[0]===id))switchScreen(id)}
</script>
</body>
</html>
