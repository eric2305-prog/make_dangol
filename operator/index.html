<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영관리자 콘솔 | REVARO</title>
<style>
  :root{--kakao:#FEE500;--ink:#191919;--soft:#3C3C3C;--muted:#767676;--line:#ECECEC;--line2:#F2F2F2;--bg:#FAFAF8;--yellow:#FFFBE6;--yellow-line:#FFF6C7;--green:#15803D;--amber:#B8860B;--red:#E0483C;--blue:#2563EB}
  *{box-sizing:border-box} body{margin:0;overflow-x:hidden;background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.55} button,input,select,textarea{font:inherit} button{cursor:pointer}
  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;background:#fff;border-right:1px solid var(--line);padding:22px 16px}.brand{font-size:1.25rem;font-weight:800}.brand span{color:#F2D200}.sub{font-size:.75rem;color:var(--muted);font-weight:700;margin-top:3px}.side-head{padding:6px 10px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .menu{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}.menu button{width:100%;border:0;background:transparent;text-align:left;border-radius:11px;padding:11px 12px;color:var(--soft);font-size:.875rem;font-weight:600}.menu button:hover{background:var(--bg);color:var(--ink)}.menu button.on{background:#FFFBE0;color:var(--ink)}.logout{margin-top:18px;color:#C0453B!important}
  .main{padding:28px 30px 70px;max-width:1200px;width:100%}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.top h1{font-size:1.25rem;font-weight:800;margin:0}.top p{margin:5px 0 0;color:var(--muted);font-size:.875rem}.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:#EEF6EE;padding:8px 13px;font-size:.75rem;font-weight:700;color:#3F8E45}
  .screen{display:none}.screen.active{display:block}.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:22px}.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px;box-shadow:0 1px 2px rgba(25,25,25,.04)}.kpi.accent{background:var(--yellow);border-color:var(--yellow-line)}.kpi .label{font-size:.75rem;color:var(--muted);font-weight:600;margin-bottom:7px}.kpi .value{font-size:1.5rem;font-weight:800;line-height:1}.kpi .unit{font-size:.875rem;color:var(--muted);font-weight:500;margin-left:3px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(25,25,25,.04);overflow:hidden;margin-bottom:18px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line2)}.panel-head h2{font-size:1.08rem;margin:0}.panel-head .hint{font-size:.82rem;color:var(--muted);margin-top:2px}.panel-body{padding:18px 20px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}
  .tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{border:0;border-radius:999px;padding:7px 13px;font-weight:700;font-size:.875rem;background:var(--line2);color:var(--soft)}.tab.on{background:var(--ink);color:#fff}.tools{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}.search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 12px}.search input{border:0;outline:0;background:transparent;width:220px}
  table{width:100%;border-collapse:collapse} th{background:var(--bg);color:var(--muted);font-size:.75rem;font-weight:700;text-align:left;padding:11px 14px} td{border-top:1px solid var(--line2);padding:13px 14px;font-size:.875rem;vertical-align:middle}.name{font-weight:700}.muted{color:var(--muted);font-size:.75rem}.badge{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:700}.green{background:#ECFDF3;color:var(--green)}.amber{background:#FFF6D6;color:var(--amber)}.gray{background:#F4F4F5;color:#71717A}.red{background:#FDECEC;color:var(--red)}.blue{background:#EFF6FF;color:var(--blue)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:.75rem;font-weight:700;color:var(--ink)}.btn.primary{border-color:var(--kakao);background:var(--kakao)}.btn:disabled{cursor:not-allowed;opacity:.45}
  .task{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 20px;border-top:1px solid var(--line2)}.task:first-child{border-top:0}.task-title{font-weight:700}.empty{padding:44px 20px;text-align:center;color:var(--muted)}.empty b{display:block;color:var(--soft);margin-bottom:5px}
  .drawer{position:fixed;right:0;top:0;height:100vh;width:min(460px,100vw);background:#fff;border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(25,25,25,.16);z-index:50;transform:translateX(110%);transition:.22s}.drawer.open{transform:none}.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;padding:22px;border-bottom:1px solid var(--line)}.drawer-body{padding:20px 22px;overflow:auto;max-height:calc(100vh - 86px)}.close{border:1px solid var(--line);background:#fff;border-radius:10px;width:36px;height:36px}
  .formrow{margin-bottom:15px}.formrow label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px}.formrow input,.formrow select{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;outline:0}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;border-radius:999px;padding:11px 16px;font-size:.875rem;font-weight:600;transition:.2s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%)}
  .pin-notice{margin:0 0 14px;border:1px solid var(--yellow-line);border-radius:12px;background:var(--yellow);padding:12px 13px;font-size:.78rem;color:var(--soft);line-height:1.55}.pin-result{display:none;margin-top:16px;border:1px solid var(--yellow-line);border-radius:14px;background:var(--yellow);padding:16px}.pin-result.show{display:block}.pin-result .once{font-size:.75rem;color:var(--muted);margin-bottom:8px}.pin-code{display:flex;align-items:center;justify-content:space-between;gap:12px}.pin-code strong{font-size:1.65rem;letter-spacing:.16em}.pin-result .btn{flex:none}
  .settings{grid-template-columns:repeat(2,minmax(0,1fr))}.setting-box{border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px}.setting-box h3{font-size:.875rem;font-weight:800;margin:0 0 10px}.setting-box li{margin:7px 0;color:var(--soft)}
  @media(max-width:900px){.app{grid-template-columns:minmax(0,1fr)}.side{position:static;height:auto}.main{padding:20px;min-width:0}.kpis,.two,.settings{grid-template-columns:1fr}.search input{width:150px} table{min-width:760px}.table-wrap{max-width:100%;overflow:auto}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-head"><div class="brand">Revaro<span>.me</span></div><div class="sub">운영관리자 콘솔</div></div>
    <ul class="menu" id="menu"></ul>
    <button class="logout btn" onclick="logout()">로그아웃</button>
  </aside>
  <main class="main">
    <div class="top"><div><h1 id="pageTitle">운영관리자 대시보드</h1><p>전체 점주, 매장별 고객 수, 점주/매장 상태를 확인합니다.</p></div><span class="chip">내부 운영자 · <span id="operatorName">확인 중</span></span></div>
    <section class="screen active" id="dashboard"></section>
    <section class="screen" id="stores"></section>
    <section class="screen" id="customers"></section>
    <section class="screen" id="messages"></section>
    <section class="screen" id="billing"></section>
    <section class="screen" id="settings"></section>
  </main>
</div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>
<script>
let operatorStores = [];
let operatorMetrics = { total_stores:0, active_stores:0, pending_stores:0, suspended_stores:0, total_customers:0 };
let activeStoreFilter = 'all';
let activeCustomerFilter = 'all';

const menus = [
  ['dashboard','대시보드'],
  ['stores','점주 관리'],
  ['customers','매장별 고객 수'],
  ['messages','AI 메시지·발송'],
  ['billing','결제·프로모션'],
  ['settings','기본 설정']
];
const badges = {
  active:['active','green'],
  pending:['pending','amber'],
  suspended:['suspended','red'],
  issued:['발급됨','green'],
  not_issued:['미발급','gray']
};

function esc(value){return String(value==null?'':value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function badge(v){let b=badges[v]||[v,'gray'];return `<span class="badge ${b[1]}">${esc(b[0])}</span>`}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2300)}
function formatDate(value){if(!value)return '-';let d=new Date(value);if(Number.isNaN(d.getTime()))return '-';return new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'}).format(d)}
function kpi(label,value,unit='',accent=''){return `<div class="kpi ${accent}"><div class="label">${label}</div><div class="value">${esc(value)}${unit?`<span class="unit">${esc(unit)}</span>`:''}</div></div>`}
function panel(title,sub,body,right=''){return `<div class="panel"><div class="panel-head"><div><h2>${esc(title)}</h2>${sub?`<div class="hint">${esc(sub)}</div>`:''}</div>${right}</div>${body}</div>`}
function table(head,rows){return `<div class="table-wrap"><table><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${head.length}"><div class="empty"><b>표시할 데이터가 없습니다</b>실제 데이터가 생기면 이곳에 표시됩니다.</div></td></tr>`}</tbody></table></div>`}
function renderMenu(){document.getElementById('menu').innerHTML=menus.map(m=>`<li><button data-id="${m[0]}" class="${m[0]==='dashboard'?'on':''}" onclick="switchScreen('${m[0]}')">${m[1]}</button></li>`).join('')}
function switchScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.menu button').forEach(b=>b.classList.toggle('on',b.dataset.id===id));document.getElementById('pageTitle').textContent=menus.find(m=>m[0]===id)[1];history.replaceState(null,'','/operator'+(id==='dashboard'?'':'#'+id))}
async function logout(){try{await fetch('/api/operator/logout',{method:'POST',credentials:'same-origin'})}catch(e){} location.replace('/operator/login')}

function renderDashboard(){
  const pending = operatorStores.filter(s=>s.status==='pending');
  const suspended = operatorStores.filter(s=>s.status==='suspended');
  document.getElementById('dashboard').innerHTML =
    `<div class="grid kpis">
      ${kpi('전체 매장', operatorMetrics.total_stores, '곳')}
      ${kpi('active', operatorMetrics.active_stores, '곳')}
      ${kpi('pending', operatorMetrics.pending_stores, '곳')}
      ${kpi('suspended', operatorMetrics.suspended_stores, '곳')}
      ${kpi('전체 고객', Number(operatorMetrics.total_customers||0).toLocaleString('ko-KR'), '명', 'accent')}
    </div>
    <div class="grid two">
      ${taskPanel('pending 매장', pending, s=>`${esc(s.storeName)}<br><span class="muted">${esc(s.ownerName||'-')} · ${esc(s.category||'-')}</span>`)}
      ${taskPanel('suspended 매장', suspended, s=>`${esc(s.storeName)}<br><span class="muted">${esc(s.ownerName||'-')} · ${Number(s.customerCount||0).toLocaleString('ko-KR')}명</span>`)}
    </div>`;
}
function taskPanel(title,items,render){
  return panel(title,'',items.length?items.map(x=>`<div class="task"><div><div class="task-title">${render(x)}</div></div><button class="btn" onclick="openStore('${esc(x.storeId)}')">상세</button></div>`).join(''):`<div class="empty"><b>${esc(title)} 없음</b>현재 처리할 항목이 없습니다.</div>`,`<span class="badge amber">${items.length}건</span>`);
}
function renderStores(filter=activeStoreFilter){
  activeStoreFilter = filter;
  const keyword = (document.getElementById('storeSearch')?.value || '').trim().toLowerCase();
  let list = filter==='all' ? operatorStores : operatorStores.filter(s=>s.status===filter);
  if(keyword) list = list.filter(s=>[s.storeName,s.storeId,s.ownerName,s.category].some(v=>String(v||'').toLowerCase().includes(keyword)));
  document.getElementById('stores').innerHTML =
    `<div class="tools"><div class="tabs">${[['all','전체'],['active','active'],['pending','pending'],['suspended','suspended']].map(t=>`<button class="tab ${filter===t[0]?'on':''}" onclick="renderStores('${t[0]}')">${t[1]}</button>`).join('')}</div><label class="search">검색 <input id="storeSearch" placeholder="매장명, 점주명" value="${esc(keyword)}" oninput="renderStores(activeStoreFilter)"></label></div>` +
    panel('전체 점주 목록','운영자는 전체 매장 데이터를 확인합니다.',table(['매장','store_id','점주','고객 수','매장 상태','점주 상태','PIN','액션'],list.map(s=>[
      `<span class="name">${esc(s.storeName)}</span><div class="muted">${esc(s.phone||'')}</div>`,
      esc(s.storeId),
      `${esc(s.ownerName||'-')}<div class="muted">${esc(s.ownerEmail||'')}</div>`,
      `${Number(s.customerCount||0).toLocaleString('ko-KR')}명`,
      badge(s.status),
      badge(s.ownerStatus),
      s.pinConfigured?badge('issued'):badge('not_issued'),
      `<button class="btn" onclick="openStore('${esc(s.storeId)}')">상세</button>`
    ])));
}
function renderCustomers(filter=activeCustomerFilter){
  activeCustomerFilter = filter;
  let list = filter==='all' ? operatorStores : operatorStores.filter(s=>s.status===filter);
  document.getElementById('customers').innerHTML =
    `<div class="tools"><div class="tabs">${[['all','전체'],['active','active'],['pending','pending'],['suspended','suspended']].map(t=>`<button class="tab ${filter===t[0]?'on':''}" onclick="renderCustomers('${t[0]}')">${t[1]}</button>`).join('')}</div></div>` +
    panel('매장별 고객 수','개인정보 목록이 아니라 매장별 고객 수만 표시합니다.',table(['매장','store_id','점주','고객 수','상태'],list.map(s=>[
      `<span class="name">${esc(s.storeName)}</span>`,
      esc(s.storeId),
      esc(s.ownerName||'-'),
      `${Number(s.customerCount||0).toLocaleString('ko-KR')}명`,
      badge(s.status)
    ])));
}
function renderMessages(){
  document.getElementById('messages').innerHTML = panel('AI 메시지·발송','실제 발송 로그 연동은 다음 단계입니다.',`<div class="empty"><b>표시할 발송 데이터가 없습니다</b>발송 로그 테이블 연결 후 이곳에 표시됩니다.</div>`);
}
function renderBilling(){
  document.getElementById('billing').innerHTML = panel('결제·프로모션','현재는 매장 상태 기준만 표시합니다.',table(['매장','store_id','상태','고객 수'],operatorStores.map(s=>[
    esc(s.storeName),
    esc(s.storeId),
    badge(s.status),
    `${Number(s.customerCount||0).toLocaleString('ko-KR')}명`
  ])));
}
function renderSettings(){
  document.getElementById('settings').innerHTML = `<div class="grid settings">${setting('MVP 운영 기준',['운영자 인증 후 전체 매장 조회','고객 개인정보 목록 미노출','PIN은 발급 직후 1회 표시'])}${setting('상태 기준',['active: 정상 운영','pending: 승인 또는 준비 대기','suspended: 중지·차단·비활성 통합'])}</div>`;
}
function setting(title,items){return `<div class="setting-box"><h3>${esc(title)}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`}
function openStore(id){
  let s=operatorStores.find(x=>x.storeId===id);
  if(!s){toast('매장 정보를 찾을 수 없습니다.');return}
  let updated=s.pinUpdatedAt?new Date(s.pinUpdatedAt).toLocaleString('ko-KR'):'발급 이력 없음';
  let reasons=`<option value="initial_issue" ${s.pinConfigured?'':'selected'}>최초 PIN 발급</option><option value="reissue" ${s.pinConfigured?'selected':''}>PIN 재발급</option>`;
  document.getElementById('drawer').innerHTML=`<div class="drawer-head"><div><h2>${esc(s.storeName)}</h2><div class="muted">${esc(s.ownerName||'-')} · ${esc(s.category||'-')}</div></div><button class="close" onclick="closeDrawer()" aria-label="닫기">×</button></div><div class="drawer-body"><div class="formrow"><label>store_id</label><input value="${esc(s.storeId)}" readonly></div><div class="formrow"><label>고객 수</label><input value="${Number(s.customerCount||0).toLocaleString('ko-KR')}명" readonly></div><div class="formrow"><label>매장 상태</label><input value="${esc(s.status)}" readonly></div><div class="formrow"><label>점주 상태</label><input value="${esc(s.ownerStatus)}" readonly></div><div class="formrow"><label>PIN 상태</label><input id="pin-status" value="${s.pinConfigured?'발급됨 · '+esc(updated):'미발급'}" readonly></div><div class="formrow"><label for="pin-reason">발급 사유</label><select id="pin-reason">${reasons}</select></div><div class="pin-notice">새 PIN을 발급하면 기존 PIN은 더 이상 사용할 수 없고, 기존 점주 로그인 세션은 만료됩니다.</div><button class="btn primary" id="issue-pin-button" onclick="issuePin('${esc(s.storeId)}')" ${s.status==='suspended'?'disabled':''}>PIN 발급/재발급</button><div class="pin-result" id="pin-result"><div class="once">새 PIN은 지금 한 번만 표시됩니다. 별도로 저장되지 않으니 점주에게 안전하게 전달하세요.</div><div class="pin-code"><strong id="issued-pin"></strong><button class="btn" onclick="copyIssuedPin()">복사</button></div></div></div>`;
  document.getElementById('drawer').classList.add('open');
}
async function issuePin(storeId){
  let store=operatorStores.find(x=>x.storeId===storeId);
  if(!store)return;
  if(!confirm(`${store.storeName}의 PIN을 발급/재발급하시겠습니까?`))return;
  let button=document.getElementById('issue-pin-button');
  let result=document.getElementById('pin-result');
  let pinEl=document.getElementById('issued-pin');
  result.classList.remove('show'); pinEl.textContent=''; button.disabled=true;
  try{
    let res=await fetch('/api/operator/pin/issue',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({store_id:storeId,reason:document.getElementById('pin-reason').value})});
    let data=await res.json();
    if(res.status===401){location.replace('/operator/login');return}
    if(!res.ok||!data.ok)throw new Error(data.message||'PIN을 발급하지 못했습니다.');
    pinEl.textContent=data.pin;
    result.classList.add('show');
    store.pinConfigured=true; store.pinUpdatedAt=new Date().toISOString();
    document.getElementById('pin-status').value='발급됨 · 방금 전';
    renderStores(activeStoreFilter);
    toast(data.action==='issued'?'PIN을 발급했습니다.':'PIN을 재발급했습니다.');
  }catch(e){toast(e.message||'PIN을 발급하지 못했습니다.')}finally{button.disabled=false}
}
async function copyIssuedPin(){
  let value=document.getElementById('issued-pin').textContent;
  if(!value)return;
  try{await navigator.clipboard.writeText(value);toast('PIN을 복사했습니다.')}catch(e){toast('PIN을 복사하지 못했습니다.')}
}
function closeDrawer(){let pin=document.getElementById('issued-pin');if(pin)pin.textContent='';let drawer=document.getElementById('drawer');drawer.classList.remove('open');drawer.innerHTML=''}
async function loadOperatorStores(){
  let res=await fetch('/api/operator/stores',{credentials:'same-origin'});
  if(res.status===401){location.replace('/operator/login');return false}
  let data=await res.json();
  if(!res.ok||!data.ok)throw new Error(data.message||'매장 목록을 불러오지 못했습니다.');
  operatorMetrics=data.metrics||operatorMetrics;
  operatorStores=(data.stores||[]).map(s=>({
    storeUuid:s.store_uuid,
    storeId:s.store_id,
    storeName:s.store_name,
    ownerName:s.owner_name,
    ownerEmail:s.owner_email,
    ownerStatus:s.owner_status,
    phone:s.phone,
    region:s.address,
    category:s.industry,
    status:s.status,
    customerCount:Number(s.customer_count||0),
    createdAt:s.created_at,
    pinConfigured:!!s.pin_configured,
    pinUpdatedAt:s.pin_updated_at
  }));
  renderDashboard(); renderStores(activeStoreFilter); renderCustomers(activeCustomerFilter); renderMessages(); renderBilling(); renderSettings();
  return true;
}
async function bootOperator(){
  try{
    let res=await fetch('/api/operator/session',{credentials:'same-origin'});
    if(!res.ok){location.replace('/operator/login');return}
    let data=await res.json();
    document.getElementById('operatorName').textContent=(data.operator_email||'운영자').split('@')[0];
    renderMenu();
    await loadOperatorStores();
    if(location.hash){let id=location.hash.slice(1);if(menus.some(m=>m[0]===id))switchScreen(id)}
  }catch(e){toast(e.message||'운영자 정보를 불러오지 못했습니다.')}
}
bootOperator();
</script>
</body>
</html>
